<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SMART Launch</title>
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/ips.png" />
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
      body {
        font-family: "Roboto", Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <h2 id="launch-msg">Launching IPS SMART Viewer</h2>
    <script>
      // Dot animation
      let dots = 0;
      const msgEl = document.getElementById("launch-msg");
      const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        msgEl.textContent = "Launching IPS SMART Viewer" + ".".repeat(dots);
      }, 500);

      // Initiate the SMART launch sequence
      FHIR.oauth2.authorize({
        clientId: "83f6e8fb-1255-48b9-8b1b-df70e7f5d1c4",
        scope:
          "patient/Patient.read patient/AllergyIntolerance.read launch online_access openid profile",
        redirectUri: "https://tarekadel89.github.io/ips-smart-viewer",
      });
    </script>
  </body>
</html>
